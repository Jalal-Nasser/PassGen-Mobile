[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
jwt_secret = "super-secret-jwt-token-with-at-least-32-characters-long"
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[db]
port = 54323
shadow_port = 54324
major_version = 15

[realtime]
enabled = true

[studio]
enabled = true
port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[functions."mobile-api-keys-create"]
verify_jwt = true

[functions."mobile-api-keys-list"]
verify_jwt = true

[functions."mobile-api-keys-revoke"]
verify_jwt = true

[functions."mobile-api-keys-verify"]
verify_jwt = false

[functions."revenuecat-webhook"]
verify_jwt = false

[analytics]
enabled = false
port = 54329

[functions.keep-alive]
enabled = true
verify_jwt = true
import_map = "./functions/keep-alive/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/keep-alive/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/keep-alive/*.html" ]
